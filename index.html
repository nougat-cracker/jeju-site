<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 감귤 체험</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #fffaf0;
        }
        header {
            background-color: #A86608;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .hero {
            background: url('https://source.unsplash.com/1600x600/?tangerine,jeju') no-repeat center/cover;
            text-align: center;
            padding: 80px 20px;
        }
        .section {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }
        footer {
            background-color: #ffb347;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        .alien {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 22px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .ufo {
            position: fixed;
            top: 100px;
            left: 100px;
            font-size: 30px;
            cursor: pointer;
        }

        .speech {
            position: fixed;
            background: white;
            border: 2px solid black;
            padding: 10px;
            font-family: monospace;
            border-radius: 8px;
        }

        .sparkle {
            position: fixed;
            font-size: 30px;
        }

        .blink {
            animation: blinkAnim 0.3s 3;
        }

        @keyframes blinkAnim {
            0%,100% {opacity:1;}
            50% {opacity:0;}
        }
    </style>
</head>
<body>

<header>
    <h1>🍊 제주 감귤 따기 체험 🍊</h1>
</header>

<footer>
    <p>© 2026 제주 감귤 체험</p>
</footer>

<div class="alien" id="alien">👽</div>

<script>
let clickCount = 0;
const alien = document.getElementById('alien');

alien.addEventListener('click', () => {
    clickCount++;

    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);
    alien.style.left = x + 'px';
    alien.style.top = y + 'px';

    if (clickCount >= 10) {
        spawnUFO();
        alien.remove();
    }
});

function spawnUFO() {
    const ufo = document.createElement('div');
    ufo.className = 'ufo';
    ufo.textContent = '🛸';
    document.body.appendChild(ufo);

    let dx = 2;
    let dy = 2;

    function move() {
        const rect = ufo.getBoundingClientRect();

        if (rect.left <= 0 || rect.right >= window.innerWidth) dx *= -1;
        if (rect.top <= 0 || rect.bottom >= window.innerHeight) dy *= -1;

        ufo.style.left = rect.left + dx + 'px';
        ufo.style.top = rect.top + dy + 'px';

        ufo.moveInterval = requestAnimationFrame(move);
    }
    move();

    ufo.addEventListener('click', () => {
        cancelAnimationFrame(ufo.moveInterval);

        const rect = ufo.getBoundingClientRect();

        showSpeech(rect.left, rect.top);
        ufo.classList.add('blink');

        setTimeout(() => {
            ufo.remove();
            showSparkle(rect.left, rect.top);
        }, 1000);
    });
}

function showSpeech(x, y) {
    const speech = document.createElement('div');
    speech.className = 'speech';
    speech.textContent = '앗, 잡혔다!!';
    speech.style.left = x + 'px';
    speech.style.top = (y - 50) + 'px';
    document.body.appendChild(speech);

    setTimeout(() => speech.remove(), 1000);
}

function showSparkle(x, y) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.textContent = '✨';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 1500);
}
</script>

</body>
</html>
