<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 감귤 체험</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #fffaf0;
        }
        header {
            background-color: #ffb347;
            color: white;
            padding: 25px;
            text-align: center;
        }
        footer {
            background-color: #ffb347;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        .alien {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 22px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .ufo {
            position: fixed;
            top: 100px;
            left: 100px;
            font-size: 30px;
            cursor: pointer;
        }

        /* 픽셀 말풍선 */
        .speech {
            position: fixed;
            background: white;
            border: 3px solid black;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 13px;
            image-rendering: pixelated;
            box-shadow: 3px 3px 0 black;
        }

        /* 말풍선 꼬리 */
        .speech::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border: 6px solid transparent;
            border-top-color: black;
            bottom: -12px;
            left: 10px;
        }

        .speech::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border: 5px solid transparent;
            border-top-color: white;
            bottom: -10px;
            left: 11px;
        }

        .sparkle {
            position: fixed;
            font-size: 30px;
        }

        .blink-fast {
            animation: blinkFast 0.2s infinite;
        }

        @keyframes blinkFast {
            0%,100% {opacity:1;}
            50% {opacity:0;}
        }

        .blink {
            animation: blinkAnim 0.3s 3;
        }

        @keyframes blinkAnim {
            0%,100% {opacity:1;}
            50% {opacity:0;}
        }
    </style>
</head>
<body>

<header>
    <h1>🍊 제주 감귤 따기 체험 🍊</h1>
</header>

<footer>
    <p>© 2026 제주 감귤 체험</p>
</footer>

<div class="alien" id="alien">👽</div>

<script>
let clickCount = 0;
const alien = document.getElementById('alien');

alien.addEventListener('click', () => {
    clickCount++;

    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);
    alien.style.left = x + 'px';
    alien.style.top = y + 'px';

    if (clickCount >= 10) {
        spawnUFO();
        alien.remove();
    }
});

function spawnUFO() {
    const ufo = document.createElement('div');
    ufo.className = 'ufo';
    ufo.textContent = '🛸';
    document.body.appendChild(ufo);

    let dx = 4; // 속도 증가
    let dy = 4;

    function randomizeDirection() {
        const angle = Math.random() * Math.PI * 2;
        dx = Math.cos(angle) * 4;
        dy = Math.sin(angle) * 4;
    }

    function move() {
        const rect = ufo.getBoundingClientRect();

        if (rect.left <= 0 || rect.right >= window.innerWidth) {
            randomizeDirection();
        }
        if (rect.top <= 0 || rect.bottom >= window.innerHeight) {
            randomizeDirection();
        }

        ufo.style.left = rect.left + dx + 'px';
        ufo.style.top = rect.top + dy + 'px';

        ufo.moveInterval = requestAnimationFrame(move);
    }
    move();

    ufo.addEventListener('click', () => {
        cancelAnimationFrame(ufo.moveInterval);

        const rect = ufo.getBoundingClientRect();

        showSpeech(rect.right + 5, rect.top); // 옆에 표시
        ufo.classList.add('blink');

        setTimeout(() => {
            ufo.remove();
            showSparkle(rect.left, rect.top);
        }, 1000);
    });
}

function showSpeech(x, y) {
    const speech = document.createElement('div');
    speech.className = 'speech';
    speech.textContent = '앗, 잡혔다!!';
    speech.style.left = x + 'px';
    speech.style.top = y + 'px';
    document.body.appendChild(speech);

    setTimeout(() => speech.remove(), 1200);
}

function showSparkle(x, y) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle blink-fast';
    sparkle.textContent = '✨';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 2000);
}
</script>

</body>
</html>
