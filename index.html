<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 감귤 체험</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #fffaf0;
        }
        header {
            background-color: #ffb347;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .hero {
            background: url('https://source.unsplash.com/1600x600/?tangerine,jeju') no-repeat center/cover;
            color: black;
            text-align: center;
            padding: 80px 20px;
        }
        .section {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
            line-height: 1.6;
        }
        .section h2 {
            color: #ffb347;
        }
        .info-box {
            background-color: #fff3e0;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        footer {
            background-color: #ffb347;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        /* 👽 외계인 */
        .alien {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🛸 UFO */
        .ufo {
            position: fixed;
            top: 50px;
            left: 0;
            font-size: 30px;
            animation: floatUFO 6s linear infinite;
            cursor: pointer;
        }

        @keyframes floatUFO {
            0% { left: -50px; }
            100% { left: 100%; }
        }

        /* ✨ 효과 */
        .sparkle {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
        }

        /* 💬 도트 말풍선 */
        .speech {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 2px solid black;
            padding: 10px 15px;
            font-size: 14px;
            font-family: monospace;
            border-radius: 8px;
        }

        /* 깜빡임 */
        .blink {
            animation: blinkAnim 0.3s 3;
        }

        @keyframes blinkAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<header>
    <h1>🍊 제주 감귤 따기 체험 🍊</h1>
    <p>직접 따고 맛보는 제주 농장 체험</p>
</header>

<div class="hero">
    <h2>달콤한 제주 감귤을 직접 수확해보세요!</h2>
</div>

<div class="section">
    <h2>🍊 체험 소개</h2>
    <p>
        제주도의 맑은 공기와 따뜻한 햇살 아래에서 자란 감귤을 직접 수확해보는 체험입니다.
    </p>
</div>

<footer>
    <p>© 2026 제주 감귤 체험 | jeju.tour.com</p>
</footer>

<!-- 👽 -->
<div class="alien" id="alien">👽</div>

<script>
let clickCount = 0;
const alien = document.getElementById('alien');

alien.addEventListener('click', () => {
    clickCount++;

    // 위치 이동
    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);
    alien.style.left = x + 'px';
    alien.style.top = y + 'px';

    if (clickCount >= 10) {
        spawnUFO();
        alien.remove();
    }
});

function spawnUFO() {
    const ufo = document.createElement('div');
    ufo.className = 'ufo';
    ufo.textContent = '🛸';
    document.body.appendChild(ufo);

    ufo.addEventListener('click', () => {
        showSpeech();
        ufo.classList.add('blink');

        setTimeout(() => {
            ufo.remove();
            showSparkle();
        }, 1000);
    });
}

function showSpeech() {
    const speech = document.createElement('div');
    speech.className = 'speech';
    speech.textContent = '앗, 잡혔다!!';
    document.body.appendChild(speech);

    setTimeout(() => speech.remove(), 1000);
}

function showSparkle() {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.textContent = '✨';
    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 3000);
}
</script>

</body>
</html>
